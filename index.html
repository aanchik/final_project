<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интеллектуальный помощник САБ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col">

    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white font-bold text-sm">САБ</div>
            <div>
                <h1 class="text-lg font-semibold tracking-wide">RAG-Помощник Персонала</h1>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs text-gray-300">Локальная LLM активна</span>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-4xl w-full mx-auto">
        <div class="flex items-start space-x-3 max-w-2xl">
            <div class="bg-blue-900 text-blue-200 p-3 rounded-lg rounded-tl-none border border-blue-700 shadow-sm text-sm">
                Приветствую. Я готов помочь вам сориентироваться в регламентах проведения досмотра и правилах воздушной перевозки оружия. Задайте ваш вопрос.
            </div>
        </div>
    </main>

    <div id="loading" class="hidden max-w-4xl w-full mx-auto px-4 pb-2 flex items-center space-x-2 text-gray-400 text-xs">
        <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Поиск в регламентах и генерация ответа...</span>
    </div>

    <footer class="bg-gray-800 border-t border-gray-700 p-4">
        <form id="chat-form" class="max-w-4xl w-full mx-auto flex space-x-3">
            <input 
                type="text" 
                id="user-input" 
                autocomplete="off"
                placeholder="Например: Досматриваются ли дипломатические лица?..." 
                class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-400 transition"
            >
            <button 
                type="submit" 
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-6 py-3 rounded-lg transition shadow-md focus:outline-none"
            >
                Отправить
            </button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading');

        // Функция форматирования ответа: превращает [досмотр.txt] в красивые теги-индикаторы
        function formatMarkdownAndSources(text) {
            // Регулярное выражение для поиска конструкций вида [досмотр.txt] или [оружие.txt]
            const sourceRegex = /\[([a-zA-Z0-9_\-\.]+?\.txt)\]/g;
            
            // Заменяем на HTML-бейджи
            let formatted = text.replace(sourceRegex, function(match, filename) {
                return `<span class="inline-block bg-blue-800 border border-blue-600 text-blue-200 text-xs font-mono px-1.5 py-0.5 rounded shadow-sm mx-0.5" title="Первоисточник регламента">${filename}</span>`;
            });

            // Элементарный парсинг переносов строк
            return formatted.replace(/\n/g, '<br>');
        }

        function appendMessage(text, isUser = false) {
            const messageWrapper = document.createElement('div');
            messageWrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full`;

            const messageBox = document.createElement('div');
            if (isUser) {
                messageBox.className = "bg-gray-700 text-gray-100 p-3 rounded-lg rounded-tr-none max-w-2xl text-sm border border-gray-600 shadow-sm";
                messageBox.textContent = text;
            } else {
                messageBox.className = "bg-gray-800 text-gray-200 p-3 rounded-lg rounded-tl-none max-w-2xl text-sm border border-gray-700 shadow-sm leading-relaxed";
                messageBox.innerHTML = formatMarkdownAndSources(text);
            }

            messageWrapper.appendChild(messageBox);
            chatContainer.appendChild(messageWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            
            // Включаем лоадер
            loadingIndicator.classList.remove('hidden');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                if (!response.ok) {
                    throw new Error('Ошибка сети при получении ответа от бэкенда');
                }

                const data = await response.json();
                appendMessage(data.answer, false);
            } catch (error) {
                appendMessage(`Произошел технический сбой: ${error.message}. Убедитесь, что сервер app.py и Ollama запущены.`, false);
            } finally {
                // Выключаем лоадер
                loadingIndicator.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
